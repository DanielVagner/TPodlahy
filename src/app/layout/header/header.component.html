<!--start page Loader -->
<div id="preloader">
  <div id="status">
    <div class="load">
      <hr />
      <hr />
      <hr />
      <hr />
    </div>
  </div>
</div>
<!--end page Loader -->

<!-- Start Navbar -->
<nav
  id="navbar"
  class="navbar navbar-expand-lg fixed-top sticky"
  (window:scroll)="windoscroll()"
>
  <div
    class="container"
    appScrollspy
    [spiedTags]="['section']"
    (sectionChange)="onSectionChange($event)"
  >
    <!-- Navbar Brand -->
    <a class="navbar-brand" href="/">
      <img src="assets/images/logo.png" alt="Podlahy Logo" height="60" />
      <span>Podlahy</span>
    </a>

    <!-- Navbar Toggler -->
    <button
      class="navbar-toggler"
      [class.collapsed]="!isMenuOpen"
      type="button"
      (click)="toggleMenu()"
      aria-label="Toggle navigation"
    >
      <span class="icon-bar top-bar"></span>
      <span class="icon-bar middle-bar"></span>
      <span class="icon-bar bottom-bar"></span>
    </button>

    <!-- Collapsible Menu -->
    <div
      class="navbar-collapse"
      [class.show]="isMenuOpen"
      id="navbarSupportedContent"
    >
      <!-- Navbar Links -->
      <ul class="navbar-nav ms-auto mb-2 mb-lg-0" id="navbar-navList">
        <li class="nav-item">
          <a
            (click)="navigateToSection('#home')"
            [ngxScrollTo]="'#home'"
            class="nav-link"
            [ngClass]="{ active: curentsection === 'home' }"
            href="javascript:void(0);"
            >Úvod</a
          >
        </li>
        <li class="nav-item">
          <a
            (click)="navigateToSection('#features')"
            [ngxScrollTo]="'#features'"
            [ngxScrollToOffset]="scrollOffset"
            class="nav-link"
            [ngClass]="{ active: curentsection === 'features' }"
            href="javascript:void(0);"
            >O nás</a
          >
        </li>
        <li class="nav-item">
          <a
            (click)="navigateToSection('#contact')"
            [ngxScrollTo]="'#contact'"
            [ngxScrollToOffset]="scrollOffset"
            class="nav-link"
            [ngClass]="{ active: curentsection === 'contact' }"
            href="javascript:void(0);"
            >Kontakty</a
          >
        </li>
        <li class="nav-item">
          <a
            (click)="navigateToSection('#reviews')"
            [ngxScrollTo]="'#reviews'"
            [ngxScrollToOffset]="scrollOffset"
            class="nav-link"
            [ngClass]="{ active: curentsection === 'reviews' }"
            href="javascript:void(0);"
            >Recenze</a
          >
        </li>
      </ul>
      <!-- Social Media Links -->
      <ul class="list-inline mb-0 ps-lg-4 ms-2">
        <li class="list-inline-item">
          <a href="https://www.facebook.com/PTpodlahy" class="primary-link">
            <i class="mdi mdi-facebook me-1"></i>
          </a>
        </li>
      </ul>
    </div>
  </div>
</nav>
<!-- End Navbar -->
