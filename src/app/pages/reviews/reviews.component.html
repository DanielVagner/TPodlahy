<div class="reviews-page" id="reviews">
    <div class="text-center mb-5">
        <h3>Recenze</h3>
        <p class="text-muted"></p>
    </div>
  
    <div class="reviews">
      <div class="review" *ngFor="let review of reviews">
        <h3>{{ review.title }}</h3>
        <blockquote>{{ review.text }}</blockquote>
        <p><strong>Hodnocení:</strong> {{ review.rating }} ⭐</p>
        <hr />
      </div>
    </div>
  
    <div class="add-review">
      <h2>Přidejte svou recenzi</h2>
      <textarea
        [(ngModel)]="newReview.text"
        placeholder="Vaše recenze"
      ></textarea>
      <br />
      <div class="add-review-action" style="text-align: right;">
      <label>
        Hodnocení:
        <input
          type="number"
          [(ngModel)]="newReview.rating"
          min="1"
          max="5"
        />
      </label>
      <br />
      <button class="mt-3" (click)="addReview()">Odeslat recenzi</button>
    </div>
    </div>
  </div>
